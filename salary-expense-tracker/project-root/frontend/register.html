<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account · ExpenseWise</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-brand">
      <span class="logo-dot">₹</span>
      <span>ExpenseWise</span>
    </div>
    <h1>Create your account</h1>
    <p class="subtitle">Start tracking your salary and expenses in minutes.</p>

    <div class="alert alert-danger" id="formAlert"></div>

    <form id="registerForm" novalidate>
      <div class="form-group">
        <label for="name">Full name</label>
        <input type="text" id="name" name="name" class="form-control" placeholder="Jane Doe" autocomplete="name">
        <div class="form-error"></div>
      </div>
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" class="form-control" placeholder="you@example.com" autocomplete="email">
        <div class="form-error"></div>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" class="form-control" placeholder="At least 6 characters" autocomplete="new-password">
        <div class="form-error"></div>
      </div>
      <div class="form-group">
        <label for="confirmPassword">Confirm password</label>
        <input type="password" id="confirmPassword" name="confirmPassword" class="form-control" placeholder="Re-enter password" autocomplete="new-password">
        <div class="form-error"></div>
      </div>
      <button type="submit" class="btn btn-primary">Create Account</button>
    </form>

    <div class="auth-switch">
      Already have an account? <a href="index.html">Log in</a>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
