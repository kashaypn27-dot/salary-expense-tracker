<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log In · ExpenseWise</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-brand">
      <span class="logo-dot">₹</span>
      <span>ExpenseWise</span>
    </div>
    <h1>Welcome back</h1>
    <p class="subtitle">Log in to manage your salary and expenses.</p>

    <div class="alert alert-danger" id="formAlert"></div>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" class="form-control" placeholder="you@example.com" autocomplete="email">
        <div class="form-error"></div>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" autocomplete="current-password">
        <div class="form-error"></div>
      </div>
      <button type="submit" class="btn btn-primary">Log In</button>
    </form>

    <div class="auth-switch">
      Don't have an account? <a href="register.html">Create one</a>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
