<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Income · ExpenseWise</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app-shell">
  <div class="main-content">
    <div class="topbar">
      <div class="flex gap-8" style="align-items:center;">
        <button class="menu-toggle" id="menuToggle">☰</button>
        <div>
          <h1>Income</h1>
          <p>Track your salary, bonuses, and other income sources.</p>
        </div>
      </div>
      <button class="btn btn-primary" id="addIncomeBtn">+ Add Income</button>
    </div>

    <div class="panel">
      <div class="panel-header">
        <h2>All Income</h2>
      </div>

      <div class="filters-bar">
        <input type="text" id="searchInput" class="form-control" placeholder="Search by source or description...">
        <select id="categoryFilter" class="form-control">
          <option value="">All Categories</option>
          <option value="Salary">Salary</option>
          <option value="Bonus">Bonus</option>
          <option value="Freelance">Freelance</option>
          <option value="Investment">Investment</option>
          <option value="Other">Other</option>
        </select>
        <select id="monthFilter" class="form-control">
          <option value="">All Months</option>
        </select>
        <select id="yearFilter" class="form-control"></select>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Source</th>
              <th>Category</th>
              <th>Description</th>
              <th style="text-align:right;">Amount</th>
              <th style="text-align:right;">Actions</th>
            </tr>
          </thead>
          <tbody id="incomeTableBody"></tbody>
        </table>
      </div>

      <div id="emptyState" class="empty-state hidden">
        <div class="icon">💸</div>
        <p>No income entries found. Add your first one!</p>
      </div>

      <div class="pagination">
        <span id="paginationInfo"></span>
        <div class="pages">
          <button class="btn btn-secondary btn-sm" id="prevPage">← Prev</button>
          <button class="btn btn-secondary btn-sm" id="nextPage">Next →</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Add/Edit Income Modal -->
<div class="modal-overlay" id="incomeModalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">Add Income</h3>
      <button class="modal-close" id="closeModalBtn">&times;</button>
    </div>
    <form id="incomeForm" novalidate>
      <input type="hidden" id="incomeId">
      <div class="form-group">
        <label for="source">Source</label>
        <input type="text" id="source" class="form-control" placeholder="e.g. Acme Corp Payroll">
        <div class="form-error"></div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="category">Category</label>
          <select id="category" class="form-control">
            <option value="Salary">Salary</option>
            <option value="Bonus">Bonus</option>
            <option value="Freelance">Freelance</option>
            <option value="Investment">Investment</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label for="amount">Amount (₹)</label>
          <input type="number" id="amount" class="form-control" placeholder="0.00" step="0.01" min="0.01">
          <div class="form-error"></div>
        </div>
      </div>
      <div class="form-group">
        <label for="incomeDate">Date</label>
        <input type="date" id="incomeDate" class="form-control">
        <div class="form-error"></div>
      </div>
      <div class="form-group">
        <label for="description">Description (optional)</label>
        <textarea id="description" class="form-control" rows="2" placeholder="Notes..."></textarea>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-secondary" id="cancelBtn">Cancel</button>
        <button type="submit" class="btn btn-primary" id="saveIncomeBtn">Save Income</button>
      </div>
    </form>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/theme.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/income.js"></script>
</body>
</html>
